<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student To Do App</title>
    <link rel="stylesheet" href="stlye.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Student To-Do List</h1>
            <p>Make your study simple, make your success easy.</p>
        </header>
        <main>
        <div class="tab-buttons">
            <button class="tab-btn active" data-target="tasks">Tasks</button>
            <button class="tab-btn" data-target="assignments">Assignments</button>
            <button class="tab-btn" data-target="exams">Exams</button>
        </div>
        <div class="tab-pane active" id="tasks">
            <h2>Tasks</h2>
            <div class="input-row">
                <input type="text" placeholder="Enter your Tasks" id="task_input">
                <button type="button" class="add-btn" data-target="task">Add</button>
            </div>
            <ul id="task_list"></ul>
        </div>
        <div class="tab-pane" id="assignments">
            <h2>Assignments</h2>
            <div class="input-row">
                <input type="text" placeholder="Enter your assignments" id="assignments_input">
                <input type="date" id="assignments_date">
                <button type="button" class="add-btn" data-target="assignments">Add</button>
            </div>
            <ul id="assignments_list"></ul>
        </div>
        <div class="tab-pane" id="exams">
            <h2>Exams</h2>
            <div class="input-row">
                <input type="text" placeholder="Enter your Exams" id="exams_input">
                <input type="date" id="exams_date">
                <button type="button" class="add-btn" data-target="exams">Add</button>
            </div>
            <ul id="exams_list"></ul>
        </div>
    </main>
        <footer>
            <h4 id="motivationText">Do not say later, do it now!</h4>
        </footer>  
    </div>
 <script src="script.js"></script>
</body>
</html>
